# ============================================
# Server Configuration
# ============================================
server.port=8080
spring.application.name=devsprint-backend

# ============================================
# PostgreSQL Database
# ============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/devsprint}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:ab1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================
# JWT Configuration
# ============================================
devsprint.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLWFuZC1sb25nLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5n}
devsprint.jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# Frontend URL
# ============================================
frontend.url=${FRONTEND_URL:http://localhost:5173}

# ============================================
# Logging
# ============================================
logging.level.com.devsprint=INFO
logging.level.org.springframework.security=INFO